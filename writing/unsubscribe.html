<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <meta name="description" content="unsubscribe from kyle's newsletter">
  <meta name="author" content="kyle barnes">

  <link rel="apple-touch-icon" sizes="180x180" href="../img/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="../img/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="../img/favicon-16x16.png">
  <link rel="manifest" href="../img/site.webmanifest">

  <title>unsubscribe - new rituals for living well</title>
  <link rel="stylesheet" href="../css/writing.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Space+Mono">
  <script src="../js/vendor/jquery-3.6.0.min.js"></script>

  <style>
    #unsubscribe-container {
      max-width: 500px;
      margin: 5em auto;
      padding: 2em;
      text-align: center;
    }

    #unsubscribe-container h2 {
      font-size: 2rem;
      font-weight: normal;
      margin-bottom: 1em;
    }

    #unsubscribe-container p {
      margin-bottom: 2em;
      line-height: 1.6;
    }

    #unsubscribe-form input[type="email"] {
      border-radius: 30px;
      background-color: inherit;
      border: 2px solid #1d3557;
      height: 2em;
      padding-left: 10px;
      font-size: 1.2em;
      font-family: 'Space Mono', monospace;
      width: 80%;
      max-width: 350px;
      margin-bottom: 10px;
    }

    #unsubscribe-form input[type="submit"] {
      border-radius: 30px;
      background-color: #1d3557;
      border: none;
      color: #fefae0;
      height: 2em;
      padding: 0 1em;
      font-size: 1em;
      font-family: 'Space Mono', monospace;
      margin-top: 10px;
      cursor: pointer;
    }

    #unsubscribe-form input[type="submit"]:hover {
      background-color: #174c96;
    }

    #confirmation {
      display: none;
      font-size: 1.2rem;
      line-height: 1.6;
    }

    #back-link {
      margin-top: 2em;
      display: block;
    }
  </style>
</head>
<body>
  <div id="unsubscribe-container">
    <div id="form-section">
      <h2>unsubscribe</h2>
      <p>sorry to see you go! enter your email below to unsubscribe from the newsletter.</p>
      <form action="https://script.google.com/macros/s/AKfycbx79hgxQDPrB6zPc3ZHwI3XGTN6HuYQFed3zGt7qJWfB0cmiN4UuLqIwOCb5VDnrrfnVg/exec" method="POST" id="unsubscribe-form">
        <input type="hidden" name="action" value="unsubscribe">
        <input type="email" id="email" name="email" required placeholder="your email">
        <br>
        <input type="submit" value="Unsubscribe">
      </form>
    </div>
    <div id="confirmation">
      <p>you've been unsubscribed. thanks for reading!</p>
      <a href="../writing.html" id="back-link">← back to newsletter archive</a>
    </div>
  </div>

  <script>
    $('#unsubscribe-form').submit(function(event) {
      event.preventDefault();
      var form = $(this);
      var formData = new FormData(form[0]);

      $.ajax({
        url: form.attr('action'),
        type: 'POST',
        data: formData,
        processData: false,
        contentType: false,
        success: function(data) {
          $('#form-section').hide();
          $('#confirmation').show();
        },
        error: function(error) {
          console.error('Error:', error);
          alert('something went wrong, please try again');
        }
      });
    });
  </script>
</body>
</html>
